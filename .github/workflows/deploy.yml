name: Deploy Quartz Site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_CONTENT_DIR: ./_external/eediy_public_content
    steps:
      - name: Checkout publish_site
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout public_content
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PUBLIC_CONTENT_REPOSITORY != '' && vars.PUBLIC_CONTENT_REPOSITORY || format('{0}/eediy_public_content', github.repository_owner) }}
          token: ${{ secrets.PUBLIC_CONTENT_READ_TOKEN != '' && secrets.PUBLIC_CONTENT_READ_TOKEN || github.token }}
          ref: main
          path: _external/eediy_public_content
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Align npm version
        run: npm install -g npm@10.9.2

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
